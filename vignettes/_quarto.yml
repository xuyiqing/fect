project:
  type: book

book:
  title: "fect -- User Manual"
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - part: "Basics"
      chapters:
        - 01-start.Rmd
        - 02-fect.Rmd
        - 03-estimands.Rmd
    - part: "Advanced estimators and inference"
      chapters:
        - 04-ife-mc.Rmd
        - 05-cfe.Rmd
        - 06-gsynth.Rmd
        - 07-inference.Rmd
    - part: "Diagnostics and extensions"
      chapters:
        - 08-hte.Rmd
        - 09-panel.Rmd
        - 10-sens.Rmd
    - part: "Reference"
      chapters:
        - 11-plots.Rmd
        - aa-cheatsheet.Rmd
        - bb-updates.Rmd
        - cc-references.qmd

bibliography: references.bib

nocite: |
  @*

suppress-bibliography: true

format:
  html:
    theme: cosmo
    code-fold: false
    code-tools: true
    code-link: true
    toc-depth: 3
    # Default rendered figure dimensions for HTML output. Tuned so that the
    # PNG width at retina dpi is close to the cosmo theme's content-column
    # width (~700-800 px), minimizing browser downscaling that would shrink
    # axis / title / stats text below the readable threshold. Per-chunk
    # `fig.width` / `fig.height` overrides still win.
    fig-width: 5.5
    fig-height: 4
    fig-format: svg

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"

editor: visual

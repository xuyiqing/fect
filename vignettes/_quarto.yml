project:
  type: book

book:
  title: "fect -- User Manual"
  sidebar:
    style: docked
    background: light
  chapters:
    - index.qmd
    - 01-start.Rmd
    - 02-fect.Rmd
    - 03-ife-mc.Rmd
    - 04-cfe.Rmd
    - 05-hte.Rmd
    - 06-plots.Rmd
    - 07-gsynth.Rmd
    - 08-panel.Rmd
    - 09-sens.Rmd
    - aa-cheatsheet.Rmd
    - references.qmd
    - bb-updates.Rmd

bibliography: references.bib

nocite: |
  @*

suppress-bibliography: true

format:
  html:
    theme: cosmo
    code-fold: false
    code-tools: true
    code-link: true
    toc-depth: 3
    # Default rendered figure dimensions for HTML output. Tuned so that the
    # PNG width at retina dpi is close to the cosmo theme's content-column
    # width (~700-800 px), minimizing browser downscaling that would shrink
    # axis / title / stats text below the readable threshold. Per-chunk
    # `fig.width` / `fig.height` overrides still win.
    fig-width: 5.5
    fig-height: 4
    fig-format: svg

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"

editor: visual
